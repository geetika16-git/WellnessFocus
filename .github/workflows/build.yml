name: Build Wellness Focus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build UI Client with PyInstaller
      shell: cmd
      run: |
        pyinstaller --onefile --windowed --name "WellnessFocusUI" --distpath dist main.py

    - name: Build Windows Service
      shell: cmd
      run: |
        cd windows_service && dotnet publish -c Release -r win-x64 --self-contained true -o ..\dist\service

    - name: Build Installer with Inno Setup
      shell: cmd
      run: |
        where ISCC.exe 2>nul
        if errorlevel 1 (
          echo Downloading Inno Setup...
          curl -L -o inno.exe "https://files.jrsoftware.org/is/6/innosetup-6.4.2.exe"
          start /wait inno.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR="C:\InnoSetup"
          set "PATH=C:\InnoSetup;%PATH%"
        )
        mkdir output
        ISCC.exe build\build_installer.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: WellnessFocus_Setup
        path: output\WellnessFocus_Setup.exe
