name: Build Wellness Focus

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: Build UI Client with Nuitka
      shell: cmd
      run: |
        python -m nuitka --onefile --windows-console-mode=disable --enable-plugin=pyside6 --assume-yes-for-downloads --output-dir=dist --output-file=WellnessFocusUI main.py

    - name: Build Windows Service
      shell: cmd
      run: |
        cd windows_service && dotnet publish -c Release -r win-x64 --self-contained true -o ..\dist\service

    - name: Install Inno Setup
      run: choco install innosetup --no-progress -y

    - name: Build Installer
      shell: pwsh
      run: |
        $root = (Get-Location).Path
        @"
        [Setup]
        AppName=Wellness Focus
        AppVersion=1.0.0
        AppPublisher=Wellness Focus
        DefaultDirName={autopf}\WellnessFocus
        DefaultGroupName=Wellness Focus
        UninstallDisplayIcon={app}\WellnessFocusUI.exe
        Compression=lzma2
        SolidCompression=yes
        OutputDir=$root\output
        OutputBaseFilename=WellnessFocus_Setup
        PrivilegesRequired=admin
        DisableProgramGroupPage=yes

        [Languages]
        Name: "english"; MessagesFile: "compiler:Default.isl"

        [Files]
        Source: "$root\dist\WellnessFocusUI.exe"; DestDir: "{app}"; Flags: ignoreversion
        Source: "$root\dist\service\*"; DestDir: "{app}\service"; Flags: ignoreversion recursesubdirs

        [Dirs]
        Name: "{commonappdata}\WellnessFocus"

        [Icons]
        Name: "{group}\Wellness Focus"; Filename: "{app}\WellnessFocusUI.exe"
        Name: "{group}\Uninstall Wellness Focus"; Filename: "{uninstallexe}"
        Name: "{commonstartup}\Wellness Focus"; Filename: "{app}\WellnessFocusUI.exe"

        [Run]
        Filename: "{app}\service\WellnessService.exe"; Parameters: "--install"; Flags: runhidden

        [UninstallRun]
        Filename: "{app}\service\WellnessService.exe"; Parameters: "--uninstall"; Flags: runhidden

        [Code]
        function InitializeUninstall: Boolean;
        var
          ResultCode: Integer;
        begin
          Exec(ExpandConstant('{app}\service\WellnessService.exe'), '--uninstall', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
          Result := True;
        end;
        "@ | Out-File -FilePath build_installer.iss -Encoding ASCII

        New-Item -ItemType Directory -Force -Path output | Out-Null
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build_installer.iss

    - name: Create Release
      shell: pwsh
      run: |
        $tag = "v{0:yyyy.MM.dd.HHmmss}" -f (Get-Date)
        gh release create $tag "output\WellnessFocus_Setup.exe#WellnessFocus-Setup" `
          --title "Wellness Focus $tag" `
          --notes "Auto-built installer. Download and run WellnessFocus_Setup.exe on the target Windows laptop."
      env:
        GH_TOKEN: ${{ github.token }}
