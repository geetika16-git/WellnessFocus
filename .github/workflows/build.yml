name: Build Wellness Focus

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build UI Client
      shell: cmd
      run: |
        pyinstaller --onefile --windowed --name "WellnessFocusUI" --distpath dist main.py

    - name: Build Windows Service
      shell: cmd
      run: |
        cd windows_service && dotnet publish -c Release -r win-x64 --self-contained true -o ..\dist\service

    - name: Install Inno Setup
      run: choco install innosetup --no-progress -y

    - name: Build Installer
      shell: cmd
      run: |
        echo === Checking dist directory ===
        dir dist /s
        echo === Running ISCC ===
        mkdir output
        cd build
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build_installer.iss

    - name: Create Release
      shell: pwsh
      run: |
        $tag = "v{0:yyyy.MM.dd.HHmmss}" -f (Get-Date)
        gh release create $tag "output\WellnessFocus_Setup.exe#WellnessFocus-Setup" `
          --title "Wellness Focus $tag" `
          --notes "Auto-built installer. Download and run WellnessFocus_Setup.exe on the target Windows laptop."
      env:
        GH_TOKEN: ${{ github.token }}
